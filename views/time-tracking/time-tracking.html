<div class="tt-view">

    <div class="tt-header">
        <h1 class="tt-title">Time Tracking</h1>
        <span class="tt-subtitle" id="tt-today-label"></span>
    </div>

    <!-- Timer -->
    <div class="tt-timer-card">
        <div class="tt-timer-left">
            <div class="tt-timer-display" id="tt-display">00:00:00</div>
            <div class="tt-timer-meta">
                <input type="text" id="tt-session-label" class="tt-session-input" placeholder="What are you working on?" />
                <select id="tt-session-tag" class="tt-tag-select">
                    <option value="">No tag</option>
                    <option value="development">Development</option>
                    <option value="design">Design</option>
                    <option value="research">Research</option>
                    <option value="meetings">Meetings</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <button class="tt-btn-start" id="tt-btn-start">Start</button>
    </div>

    <!-- Today's sessions -->
    <div class="tt-section">
        <h2 class="section-title">Today</h2>
        <div class="tt-sessions" id="tt-sessions-list">
            <div class="tt-empty">No sessions recorded today</div>
        </div>
        <div class="tt-day-total">
            <span class="tt-day-total-label">Total today</span>
            <span class="tt-day-total-value" id="tt-day-total">0h 00m</span>
        </div>
    </div>

    <!-- Weekly summary -->
    <div class="tt-section">
        <h2 class="section-title">This Week</h2>
        <div class="tt-week-grid" id="tt-week-grid">
            <div class="tt-week-day">
                <span class="tt-week-day-label">Mon</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 40%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Tue</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 70%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Wed</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 55%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Thu</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 90%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Fri</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 30%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Sat</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 10%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
            <div class="tt-week-day">
                <span class="tt-week-day-label">Sun</span>
                <div class="tt-week-bar-wrap">
                    <div class="tt-week-bar placeholder-bar" style="height: 0%"></div>
                </div>
                <span class="tt-week-day-value placeholder-text-sm"></span>
            </div>
        </div>
    </div>

</div>
