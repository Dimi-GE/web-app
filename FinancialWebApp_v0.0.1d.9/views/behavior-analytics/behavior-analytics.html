<div class="behavior-analytics-view">

    <section class="dashboard-section">
        <h2 class="section-title">Activity Intensity</h2>
        <div class="intensity-row">
            <div class="intensity-col" id="spending-heatmap-slot"></div>
            <button class="sync-between-btn active" id="sync-toggle" title="Sync both maps">
                <i class="ti ti-link"></i>
            </button>
            <div class="intensity-col" id="earnings-heatmap-slot"></div>
        </div>
    </section>

    <section class="dashboard-section" id="trends-slot">
        <h2 class="section-title">Trends</h2>
        <div class="analytics-placeholder"><span>Coming soon</span></div>
    </section>

    <section class="dashboard-section" id="forecasting-slot">
        <h2 class="section-title">Forecasting</h2>
        <div class="analytics-placeholder"><span>Coming soon</span></div>
    </section>

</div>
