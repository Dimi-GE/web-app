<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Reporting Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Weekly Report</h1>
        
        <!-- Quads Container -->
        <div id="quads-container" class="quads-container">
            <!-- Quads will be generated by JavaScript -->
        </div>

        <!-- Graph Container -->
        <div class="graph-container">
            <canvas id="reportChart"></canvas>
        </div>

        <!-- Button -->
        <div class="button-container">
            <button id="updateButton" class="action-button">Update Data</button>
        </div>
    </div>

    <!-- Chart.js CDN -->
    <script src="jsonParser.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
